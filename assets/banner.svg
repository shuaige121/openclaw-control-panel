<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#bc8cff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#58a6ff">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
    <line x1="1100" y1="0" x2="1100" y2="320"/>
  </g>

  <!-- Worldline traces -->
  <g filter="url(#soft-glow)" opacity="0.15">
    <path d="M 0 200 Q 200 180, 400 160 T 800 120 T 1200 100" stroke="#58a6ff" stroke-width="1.5" fill="none"/>
    <path d="M 0 220 Q 250 210, 500 190 T 900 170 T 1200 160" stroke="#bc8cff" stroke-width="1.5" fill="none"/>
    <path d="M 0 240 Q 300 230, 600 220 T 1000 200 T 1200 190" stroke="#7ee787" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Decorative nodes -->
  <g filter="url(#glow)">
    <circle cx="200" cy="185" r="3" fill="#58a6ff" opacity="0.6"/>
    <circle cx="500" cy="175" r="3" fill="#bc8cff" opacity="0.6"/>
    <circle cx="800" cy="140" r="3" fill="#7ee787" opacity="0.6"/>
    <circle cx="400" cy="160" r="2" fill="#58a6ff" opacity="0.4"/>
    <circle cx="700" cy="155" r="2" fill="#bc8cff" opacity="0.4"/>
    <circle cx="1000" cy="170" r="2" fill="#7ee787" opacity="0.4"/>
  </g>

  <!-- Lobster icon -->
  <text x="600" y="95" text-anchor="middle" font-size="52" opacity="0.9">🦞</text>

  <!-- Title -->
  <text x="600" y="155" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="46" fill="url(#accent)" letter-spacing="-1">
    OpenClaw Manager
  </text>

  <!-- Divider line -->
  <rect x="350" y="172" width="500" height="1.5" fill="url(#line-glow)" rx="1" filter="url(#glow)"/>

  <!-- Tagline -->
  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#8b949e" letter-spacing="3">
    MULTI-PROJECT CONTROL PLANE
  </text>

  <!-- Subtitle -->
  <text x="600" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="16" fill="#6e7681">
    One mind, one job. Many minds, one manager.
  </text>

  <!-- Bottom pills -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">
    <!-- Registry -->
    <rect x="280" y="260" width="90" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="325" y="277" text-anchor="middle" fill="#58a6ff">Registry</text>
    <!-- Health -->
    <rect x="385" y="260" width="80" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="425" y="277" text-anchor="middle" fill="#7ee787">Health</text>
    <!-- Lifecycle -->
    <rect x="480" y="260" width="90" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="525" y="277" text-anchor="middle" fill="#d2a8ff">Lifecycle</text>
    <!-- Bulk Ops -->
    <rect x="585" y="260" width="90" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="630" y="277" text-anchor="middle" fill="#f0883e">Bulk Ops</text>
    <!-- Telegram -->
    <rect x="690" y="260" width="95" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="737" y="277" text-anchor="middle" fill="#79c0ff">Telegram</text>
    <!-- Deep Link -->
    <rect x="800" y="260" width="100" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="850" y="277" text-anchor="middle" fill="#ff7b72">Deep Link</text>
  </g>
</svg>
